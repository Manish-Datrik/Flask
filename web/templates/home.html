{% extends "base.html" %}
{% block title %}Home{% endblock %}

{% block content %}
<div class="card">

        Welcome back to your simple, clean space. Feel free to explore and manage your account.

    <div style="display: flex; gap: 1rem; justify-content: center; margin-top: 2rem;">
