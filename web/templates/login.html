{% extends "base.html" %}
{% block title %}Log In{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Welcome Back</h2>
    <form method="post">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input 
                type="email" 
                name="email" 
                id="email" 
                placeholder="you@email.com"
                class="form-control"
                required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input 
                type="password" 
                name="password" 
                id="password" 
                placeholder="Enter password"
                class="form-control"
                required>
        </div>
        <button type="submit" style="margin-top: 1rem;">Log In</button>
    </form>
    <p style="text-align: center; margin-top: 2rem; color: #64748b; font-size: 0.875rem;">
        No account? <a href="/sign-up" style="color: #3b82f6; text-decoration: none; font-weight: 500;">Sign up</a> Now
    </p>
</div>
{% endblock %}
