{% extends "base.html" %}
{% block title %}Create Account{% endblock %}

{% block content %}
<div class="card" style="max-width: 450px; margin: 0 auto;">
    <h2 style="text-align: center; margin-bottom: 2rem;">Join Us Today</h2>
    <form method="post">
        <div class="form-group">
            <label for="name">Your Name</label>
            <input 
                type="text" 
                name="name" 
                id="name" 
                placeholder="Full Name"
                class="form-control"
                required>
        </div>
        <div class="form-group">
            <label for="email">Email Address</label>
            <input 
                type="email" 
                name="email" 
                id="email" 
                placeholder="you@email.com"
                class="form-control"
                required>
        </div>
        <div class="form-group">
            <label for="pass1">Password</label>
            <input 
                type="password" 
                name="passdword1" 
                id="pass1" 
                placeholder="Pick a strong password"
                class="form-control"
                required>
        </div>
        <div class="form-group">
            <label for="pass2">Confirm Password</label>
            <input 
                type="password" 
                name="passdword2" 
                id="pass2" 
                placeholder="Repeat password"
                class="form-control"
                required>
        </div>
        <button type="submit" style="margin-top: 1.5rem;">Create Account</button>
    </form>
    <p style="text-align: center; margin-top: 2rem; color: #64748b; font-size: 0.875rem;">
        Already joined? <a href="/login" style="color: #3b82f6; text-decoration: none; font-weight: 500;">Log in</a>
    </p>
</div>
{% endblock %}
